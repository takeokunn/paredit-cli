name: Feature Request
description: Propose a new capability that fits structural S-expression editing.
title: "[feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Requests that expand surface area without clear structural-editing value are unlikely to be accepted.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What concrete workflow or limitation does this request address?
      placeholder: "I need to review a planned structural refactor across multiple files without applying changes yet."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed Change
      description: Describe the command, output contract, or workflow you want.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Why This Fits `paredit-cli`
      description: Explain how the request aligns with structural editing, plan-first verification, or machine-readable workflows.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe current workarounds or why existing commands are insufficient.
    validations:
      required: true
